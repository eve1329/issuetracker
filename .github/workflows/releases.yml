name: Release Plugin

on:
    push:
        tags:
            - "*"

permissions:
    contents: write

env:
    PLUGIN_NAME: issuetracker

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Check out source
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build plugin
              run: npm run build

            - name: Package release assets
              run: |
                  mkdir "${PLUGIN_NAME}"
                  cp main.js manifest.json versions.json "${PLUGIN_NAME}/"
                  zip -r "${PLUGIN_NAME}-${GITHUB_REF_NAME}.zip" "${PLUGIN_NAME}"

            - name: Publish GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: ${{ github.ref_name }}
                  files: |
                      main.js
                      manifest.json
                      versions.json
                      ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip
